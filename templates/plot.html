<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Plot — Keithley Data</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.18.2.min.js"></script>
</head>
<body>
  <main>
    <h1>Plot Data</h1>
    <div id="controls">
      <button id="add-plot">Add plot</button>

    <section>
      <h2>Live Stream</h2>
      <button id="stream-toggle">Start Stream</button>
      <div id="live-plot" style="height:360px; margin-top:8px;"></div>
    </section>
    <div id="plots"></div>
  </main>
  <script src="/static/plot.js"></script>
</body>
</html>
