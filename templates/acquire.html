<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Acquire — Keithley 2602</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.18.2.min.js"></script>
  </head>
<body>
  <main>
    <h1>Acquire — Keithley 2602</h1>
    <section>
      <p>Status: <strong id="status">checking...</strong></p>
      <p>IDN: <span id="idn">-</span></p>
      <div style="margin-top:8px">
        <button id="open">Open Connection</button>
        <button id="close">Close Connection</button>
        <button id="refresh">Refresh Status</button>
      </div>
      <div id="result" style="margin-top:8px"></div>
    </section>

    <section>
      <h2>SMU Controls</h2>
      <div class="smu-grid">
        <div class="smu-col" id="smu-A">
          <h3>SMU A</h3>
          <label class="smu-row">Output: <input type="checkbox" id="smua-output" /></label>
          <label>NPLC: <select id="smua-nplc"></select></label>
          <label>Source: <select id="smua-source"><option value="voltage">Voltage</option><option value="current">Current</option></select></label>
          <label>Source Voltage Range: <select id="smua-src-voltage-range"></select></label>
          <label>Source Voltage Limit: <input id="smua-src-voltage-limit" type="number" step="any"/></label>
          <label>Source Current Range: <select id="smua-src-current-range"></select></label>
          <label>Source Current Limit: <input id="smua-src-current-limit" type="number" step="any"/></label>
          <label>Measure Voltage Range: <select id="smua-meas-voltage-range"></select></label>
          <label>Measure Current Range: <select id="smua-meas-current-range"></select></label>
          <div style="margin-top:6px"><button id="smua-force">Force Update</button></div>
        </div>

        <div class="smu-col" id="smu-B">
          <h3>SMU B</h3>
          <label class="smu-row">Output: <input type="checkbox" id="smub-output" /></label>
          <label>NPLC: <select id="smub-nplc"></select></label>
          <label>Source: <select id="smub-source"><option value="voltage">Voltage</option><option value="current">Current</option></select></label>
          <label>Source Voltage Range: <select id="smub-src-voltage-range"></select></label>
          <label>Source Voltage Limit: <input id="smub-src-voltage-limit" type="number" step="any"/></label>
          <label>Source Current Range: <select id="smub-src-current-range"></select></label>
          <label>Source Current Limit: <input id="smub-src-current-limit" type="number" step="any"/></label>
          <label>Measure Voltage Range: <select id="smub-meas-voltage-range"></select></label>
          <label>Measure Current Range: <select id="smub-meas-current-range"></select></label>
          <div style="margin-top:6px"><button id="smub-force">Force Update</button></div>
        </div>
      </div>
    </section>
    <section>
      <h2>Live Stream</h2>
      <button id="stream-toggle">Start Stream</button>
      <div id="live-plot" style="height:360px; margin-top:8px;"></div>
    </section>
  </main>
  <script src="/static/acquire.js"></script>
</body>
</html>
